<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMusic</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎧 MyMusic</h2>

    <div class="menu">
        <p onclick="switchPage('home')"><i class="fas fa-home"></i> Home</p>
        <p onclick="switchPage('playlist')"><i class="fas fa-list"></i> Playlist</p>
    </div>

    <div class="library">
        <h4>Your Library</h4>
        <div id="playlistContainer"></div>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <input type="text" id="search" placeholder="Search songs...">
    </div>

    <!-- HOME -->
    <section id="home" class="page active">
        <h1>Good Evening</h1>
        <div id="songsContainer" class="grid"></div>
    </section>

</div>

<!-- PLAYER -->
<div class="player">

    <div class="song-info">
        <img id="cover">
        <div>
            <h4 id="title">Select Song</h4>
            <p id="artist"></p>
        </div>
    </div>

    <div class="controls">
        <i class="fas fa-backward" onclick="prev()"></i>
        <i class="fas fa-play" id="playBtn" onclick="togglePlay()"></i>
        <i class="fas fa-forward" onclick="next()"></i>
    </div>

    <input type="range" id="progress">
</div>

<audio id="audio"></audio>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
